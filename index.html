<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text-To-VRMA — VRM特化型Text-To-Motionツール</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕺</text></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #12141a;
      --panel: #1c1f28;
      --panel2: #242836;
      --border: #323848;
      --text: #e8eaf0;
      --muted: #9aa2b5;
      --accent: #6ee7a0;
      --accent2: #4cc2ff;
    }
    body {
      font-family: "Hiragino Sans", "Yu Gothic UI", "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; overflow: hidden;
    }
    #panel {
      width: 340px; min-width: 340px; padding: 18px;
      background: var(--panel); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 12px; overflow-y: auto;
    }
    /* 履歴が増えても入力欄などが押し潰されないようにする */
    #panel > * { flex-shrink: 0; }
    h1 { font-size: 17px; letter-spacing: 0.02em; }
    h1 span { color: var(--accent); }
    #langSelect {
      float: right; font-size: 11px; padding: 2px 4px;
      background: #1a1e27; color: #c6cbd6; border: 1px solid #2a3040; border-radius: 6px;
    }
    .sub { font-size: 11.5px; color: var(--muted); line-height: 1.5; }
    textarea {
      width: 100%; height: 84px; resize: vertical;
      background: var(--panel2); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px; font-size: 14px; font-family: inherit;
    }
    textarea:focus { outline: 1px solid var(--accent2); }
    button {
      border: none; border-radius: 8px; padding: 10px 14px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: filter 0.15s;
    }
    button:hover { filter: brightness(1.12); }
    button:disabled { opacity: 0.45; cursor: default; }
    #generateBtn { background: var(--accent); color: #10231a; }
    .row { display: flex; gap: 8px; }
    .row button { flex: 1; }
    #exportBtn { background: var(--panel2); color: var(--text); border: 1px solid var(--border); }
    #status {
      font-size: 12.5px; line-height: 1.6; color: var(--muted);
      background: var(--panel2); border-radius: 8px; padding: 10px;
      min-height: 58px; white-space: pre-wrap;
    }
    #status.ok { color: var(--accent); }
    #status.err { color: #ff8484; }
    input[type="password"], input[type="text"], select {
      width: 100%; padding: 8px;
      background: var(--panel2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 12.5px;
      font-family: inherit;
    }
    label.check {
      font-size: 12px; color: var(--muted); display: flex; gap: 6px;
      align-items: center; cursor: pointer;
    }
    button.primary-outline {
      background: var(--panel2); color: var(--accent2);
      border: 1.5px solid var(--accent2); font-weight: 600; font-size: 14px;
    }
    #viewerWrap.dragover::after {
      content: 'VRMファイルをドロップして読み込み';
      position: absolute; inset: 12px; display: flex;
      align-items: center; justify-content: center;
      border: 2px dashed var(--accent2); border-radius: 12px;
      background: rgba(76, 194, 255, 0.08); color: var(--accent2);
      font-size: 16px; pointer-events: none;
    }
    #history {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 260px; overflow-y: auto;
    }
    .hist-item {
      display: flex; align-items: center; gap: 8px;
      background: var(--panel2); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 10px; font-size: 12.5px;
    }
    .hist-item .name {
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--text);
    }
    .hist-item .meta { color: var(--muted); font-size: 11px; }
    .hist-item button {
      padding: 4px 9px; font-size: 12px; border-radius: 6px;
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
    }
    .hist-item button.play { color: var(--accent); border-color: var(--accent); }
    #viewerWrap { flex: 1; position: relative; }
    #updateBanner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: #1d2733; color: var(--accent); text-align: center;
      padding: 8px 12px; font-size: 13px;
      border-bottom: 1px solid rgba(74, 222, 128, 0.4);
    }
    #updateBanner a { color: var(--accent); font-weight: bold; }
    #updateBanner button {
      background: none; border: none; color: #8b93a5; cursor: pointer;
      font-size: 14px; margin-left: 12px;
    }
    #waypointGuide {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(18, 20, 26, 0.85); color: var(--accent);
      padding: 6px 14px; border-radius: 8px; font-size: 12px;
      border: 1px solid rgba(74, 222, 128, 0.4); pointer-events: none;
      white-space: nowrap;
    }
    canvas { display: block; width: 100%; height: 100%; }
    .section-title { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 2px; }
    .auth-box { display: flex; flex-direction: column; gap: 8px; }
    .auth-state {
      font-size: 11.5px; line-height: 1.5; color: var(--muted);
      border-left: 2px solid var(--border); padding-left: 8px;
    }
    .auth-state.ok { color: var(--accent); border-color: var(--accent); }
    .auth-state.err { color: #ff8484; border-color: #ff8484; }
    .gen-progress-track {
      height: 8px; border-radius: 4px; overflow: hidden;
      background: rgba(255, 255, 255, 0.08); margin-top: 8px;
    }
    .gen-progress-bar {
      height: 100%; width: 0%; background: var(--accent);
      border-radius: 4px; transition: width 0.4s ease;
    }
    .auth-actions { display: flex; gap: 8px; }
    .auth-actions button { flex: 1; padding: 8px; font-size: 12px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="panel">
    <h1>Text <span>To</span> VRMA
      <select id="langSelect" title="Language">
        <option value="ja">日本語</option>
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="ko">한국어</option>
      </select>
    </h1>
    <p class="sub" data-i18n="tagline">テキストからVRMアニメーション (.vrma) を生成して、その場でキャラクターを動かします。</p>

    <div class="section-title" data-i18n="sec.model">1. VRMモデル</div>
    <button id="vrmBtn" class="primary-outline" data-i18n="btn.openVrm">📂 VRMファイルを開く</button>
    <input type="file" id="vrmFile" accept=".vrm" style="display:none" />
    <p class="sub" id="vrmName" data-i18n="vrm.initial">読み込み中... — 3Dビューへのドラッグ&amp;ドロップでも読み込めます。</p>

    <div class="section-title" data-i18n="sec.engine">2. 🤖 生成エンジン</div>
    <select id="authMode">
      <option value="api-key" data-i18n="engine.apiKey">OpenAI APIキー</option>
      <option value="codex" data-i18n="engine.codex">Codexサブスクリプション</option>
      <option value="ardy" data-i18n="engine.ardy">ARDYローカルエンジン</option>
    </select>
    <div id="apiSettings" class="auth-box">
      <input type="password" id="apiKey" placeholder="OpenAI APIキー (sk-...)" data-i18n-placeholder="apiKey.ph" />
      <select id="apiModelSelect">
        <option value="gpt-5.6-sol" data-i18n="model.best">gpt-5.6-sol (最高精度)</option>
        <option value="gpt-5.6-terra" data-i18n="model.balanced">gpt-5.6-terra (バランス)</option>
        <option value="gpt-5.6-luna" data-i18n="model.low">gpt-5.6-luna (低コスト)</option>
      </select>
    </div>
    <div id="codexSettings" class="auth-box hidden">
      <div id="codexAuthState" class="auth-state" data-i18n="codex.checking">Codex CLIを確認中...</div>
      <select id="codexModelSelect" disabled>
        <option value="" data-i18n="codex.afterLogin">ログイン後にモデルを取得します</option>
      </select>
      <div class="auth-actions">
        <button id="codexLoginBtn" class="primary-outline" data-i18n="btn.codexLogin">ChatGPTでログイン</button>
        <button id="codexLogoutBtn" disabled data-i18n="btn.codexLogout">ログアウト</button>
      </div>
    </div>
    <div id="ardySettings" class="auth-box hidden">
      <div id="ardyState" class="auth-state" data-i18n="ardy.unknown">エンジン未確認</div>
      <div class="auth-actions">
        <button id="ardyStartBtn" class="primary-outline hidden" data-i18n="btn.engineStart">エンジンを起動</button>
        <button id="ardySetupBtn" class="hidden" data-i18n="btn.engineSetup">⬇ エンジンをセットアップ (初回のみ)</button>
      </div>
      <label class="check" title="ONにすると3Dビューの床をクリックして経由地を置けます。キャラクターは経由地を順番に通るように動きます。右クリックで1つ取り消し。" data-i18n-title="wp.labelTitle">
        <input type="checkbox" id="waypointCheck" /> <span data-i18n="wp.label">📍 経由地モード (床クリックで配置)</span>
      </label>
      <div class="auth-actions">
        <button id="waypointClearBtn" class="hidden" data-i18n="wp.clear">経由地をクリア</button>
      </div>
      <p class="sub" title="全身運動はNVIDIAのモーションAI、精密なポーズ指定はGPTキーフレームに自動で振り分けます (APIキー保存時)。APIキーがない場合はARDY単体+ローカル英訳で動きます。" data-i18n="ardy.desc" data-i18n-title="ardy.descTitle">ARDY (体) × GPT (頭) のハイブリッド。日本語OK、長さ・表情は自動。</p>
      <details>
        <summary class="sub" data-i18n="adv">詳細設定</summary>
        <input type="text" id="ardyUrl" value="http://127.0.0.1:2337" title="ARDYエンジンサーバーのURL" style="width:100%" />
      </details>
    </div>
    <label class="check" title="生成後にもう1パス、可動域・軌道・緩急のセルフレビューを行って品質を上げます。時間とAPIコストは約2倍になります。" data-i18n-title="refine.title">
      <input type="checkbox" id="refineCheck" checked />
      <span data-i18n="refine.label">🔍 自己修正 (2パス生成で品質向上)</span>
    </label>
    <div class="section-title" data-i18n="sec.text">3. モーションをテキストで指示</div>
    <textarea id="textInput" placeholder="例: その場で歩く&#10;例: 喜んでジャンプする&#10;例: 手を振る&#10;例: 悲しそうにうつむく" data-i18n-placeholder="input.ph"></textarea>
    <label class="check" title="生成したモーションを繰り返し再生するか。自動は、エンジンの判断 (LLMモード) または動きの内容 (ARDY: その場の動きならループ、移動する動きなら1回) で決まります。" data-i18n-title="loop.title">
      <span data-i18n="loop.label">ループ再生:</span>
      <select id="loopSelect" style="flex:1">
        <option value="auto" data-i18n="loop.auto">自動</option>
        <option value="on" data-i18n="loop.on">常にループ</option>
        <option value="off" data-i18n="loop.off">1回だけ再生</option>
      </select>
    </label>
    <button id="generateBtn" data-i18n="btn.generate">▶ モーション生成 &amp; 再生</button>
    <div id="genProgress" class="hidden">
      <div class="gen-progress-track"><div id="genProgressBar" class="gen-progress-bar"></div></div>
      <p class="sub" id="genProgressText"></p>
    </div>

    <button id="exportBtn" disabled data-i18n="btn.export">⬇ .vrma 保存</button>
    <label class="check">
      <input type="checkbox" id="exprCheck" checked />
      <span data-i18n="expr.label">😊 表情を含めて保存 (対応アプリでのみ再生されます)</span>
    </label>

    <div id="status" data-i18n="status.preparing">準備中...</div>

    <div class="section-title" data-i18n="sec.history">生成履歴</div>
    <div id="history"><p class="sub" data-i18n="history.empty">まだ生成したモーションはありません。</p></div>
  </div>

  <div id="viewerWrap">
    <canvas id="canvas"></canvas>
    <div id="waypointGuide" class="hidden" data-i18n="wp.guide">📍 床クリック: 経由地を追加 / 右クリック: 1つ取り消し — キャラは番号順に通ります</div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
